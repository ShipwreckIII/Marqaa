<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- 8-pointed star using two overlapping squares -->
  <g transform="translate(30,30)">
    <!-- Outer octagon outline -->
    <polygon points="0,-20 14,-14 20,0 14,14 0,20 -14,14 -20,0 -14,-14"
      fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.5"/>
    <!-- Rotated square 1 -->
    <polygon points="0,-14 14,0 0,14 -14,0"
      fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <!-- Rotated square 2 -->
    <polygon points="-10,-10 10,-10 10,10 -10,10"
      fill="none" stroke="#C9A84C" stroke-width="0.8" transform="rotate(45)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#C9A84C"/>
    <!-- Corner dots -->
    <circle cx="0" cy="-20" r="1.2" fill="#C9A84C" opacity="0.5"/>
    <circle cx="0" cy="20" r="1.2" fill="#C9A84C" opacity="0.5"/>
    <circle cx="-20" cy="0" r="1.2" fill="#C9A84C" opacity="0.5"/>
    <circle cx="20" cy="0" r="1.2" fill="#C9A84C" opacity="0.5"/>
  </g>
</svg>
