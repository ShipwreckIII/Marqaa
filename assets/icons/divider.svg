<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 24" width="600" height="24">
  <!-- Left line -->
  <line x1="0" y1="12" x2="255" y2="12" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
  <!-- Center diamond cluster -->
  <g transform="translate(300,12)">
    <!-- Outer diamond -->
    <polygon points="0,-8 6,0 0,8 -6,0" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
    <!-- Inner diamond -->
    <polygon points="0,-4 3,0 0,4 -3,0" fill="#C9A84C"/>
    <!-- Side small diamonds -->
    <polygon points="-18,-3 -15,0 -18,3 -21,0" fill="#C9A84C" opacity="0.6"/>
    <polygon points="18,-3 21,0 18,3 15,0" fill="#C9A84C" opacity="0.6"/>
    <!-- Dots -->
    <circle cx="-30" cy="0" r="1.5" fill="#C9A84C" opacity="0.5"/>
    <circle cx="30" cy="0" r="1.5" fill="#C9A84C" opacity="0.5"/>
  </g>
  <!-- Right line -->
  <line x1="345" y1="12" x2="600" y2="12" stroke="#C9A84C" stroke-width="0.8" opacity="0.7"/>
</svg>
